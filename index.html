<!doctype html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mauritius Mass Finder / Trouver une Messe à Maurice</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#7b2f2f">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
:root{--bg:#f7f3ef;--card:#fff;--ink:#231f20;--muted:#6f6660;--line:#e4d8d0;--accent:#7b2f2f;--accent2:#f0e2db;--ok:#eef8ee;--warn:#fff8e5;--shadow:0 10px 30px rgba(44,26,18,.08)}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.4}.wrap{max-width:1120px;margin:0 auto;padding:18px}.hero{background:linear-gradient(135deg,#7b2f2f,#4c1d1d);color:#fff;border-radius:24px;padding:24px;box-shadow:var(--shadow)}.heroTop{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.langToggle{display:flex;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:5px;flex:0 0 auto}.langToggle button{padding:7px 10px;border-radius:999px;border:0;background:transparent;color:#fff;font-weight:700}.langToggle button.active{background:#fff;color:#7b2f2f}h1{font-size:clamp(28px,5vw,48px);margin:0 0 6px}.hero p{max-width:760px;margin:0;opacity:.92}.toolbar,.panel,.card{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:20px}.toolbar{margin:16px 0;padding:14px}.grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px}input,select,button{font:inherit;border-radius:14px;border:1px solid var(--line);padding:11px 12px;background:#fff}button{cursor:pointer}.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.ghost{background:#fff}.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:10px}.small{font-size:13px;color:var(--muted)}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin:14px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.stat b{display:block;font-size:24px}.notice{padding:12px 14px;border-radius:16px;margin:10px 0}.notice.ok{background:var(--ok);border:1px solid #cfe8cf}.notice.warn{background:var(--warn);border:1px solid #eadba6}.card{padding:16px;margin:12px 0}.top{display:flex;justify-content:space-between;gap:12px}.site{font-weight:800;font-size:20px}.meta{color:var(--muted);font-size:14px}.time{font-size:24px;font-weight:900;color:var(--accent);white-space:nowrap}.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.badge{font-size:12px;border:1px solid var(--line);background:#faf7f4;border-radius:999px;padding:5px 8px}.badge.mass{background:var(--accent2);border-color:#dcc6bb}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.actions a,.actions button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 10px;text-decoration:none;color:var(--ink)}.actions .primarylink{background:var(--accent);border-color:var(--accent);color:#fff}.fav.active{background:#fff0c2}.empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:22px;text-align:center;color:var(--muted)}details{margin:18px 0;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}footer{color:var(--muted);font-size:13px;margin:20px 0}@media(max-width:760px){.heroTop{flex-direction:column}.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.top{align-items:flex-start}.row button{flex:1 1 auto}.wrap{padding:12px}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero"><div class="heroTop"><div><h1 data-i18n="appTitle">Mauritius Mass Finder</h1><p data-i18n="heroText">Find a Mass quickly anywhere in Mauritius</p></div><div class="langToggle" aria-label="Language"><button id="langEn" type="button">EN</button><button id="langFr" type="button">FR</button></div></div></header>
<section class="toolbar">
<div class="grid">
<input id="q" data-i18n-placeholder="searchPlaceholder" placeholder="Search parish, church, town…" autocomplete="off">
<select id="day"><option value="" data-i18n="anyDay">Any day</option></select>
<select id="region"><option value="" data-i18n="allRegions">All regions</option></select>
<select id="mode"><option value="mass" data-i18n="massesOnly">Masses only</option><option value="all" data-i18n="includeOther">Include other celebrations</option></select>
</div>
<div class="row">
<button class="primary" id="nextBtn" data-i18n="findNext">Find next Mass</button>
<button class="ghost" id="nearBtn" data-i18n="useLocation">Use my location</button>
<button class="ghost" id="favOnlyBtn" data-i18n="favouritesOnly">Favourites only</button>
<button class="ghost" id="clearBtn" data-i18n="clear">Clear</button>
<span class="small" id="dataStatus" data-i18n="loading">Loading data…</span>
</div>
</section>
<section class="stats" id="stats"></section>
<section id="notice"></section>
<section id="results"></section>
<footer data-i18n="footerNote">Sources are linked on each result. Always verify special services directly with the parish when timing is critical.</footer>
</div>
<script src="config.js"></script>
<script src="fallback-data.js"></script>
<script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mauritius Mass Finder</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#23395d">
</head>
<body>
  <header>
    <h1 id="title">Mauritius Mass Finder</h1>
    <p id="subtitle"></p>
    <button id="langBtn" class="lang" type="button">Français</button>
  </header>
  <div id="updateBanner" class="update-banner" hidden></div>
  <div id="notice" class="notice" role="status" aria-live="polite" hidden></div>
  <main>
    <section class="controls" aria-label="Search and filters">
      <input id="search" type="search" autocomplete="off">
      <select id="day" aria-label="Day filter"></select>
      <button id="sundayBtn" type="button"></button>
      <label class="check"><input id="include" type="checkbox"> <span id="includeLabel"></span></label>
    </section>
    <section class="quickActions" id="quickActions" aria-label="Quick actions">
      <div class="sectionHead"><h2 id="quickTitle"></h2><span class="small" id="quickHint"></span></div>
      <div class="quickGrid">
        <button class="quickCard primaryQuick" id="qaNow" type="button"><div class="quickIcon">⏰</div><div class="quickTitle" id="qaNowTitle"></div><div class="quickText" id="qaNowText"></div></button>
        <button class="quickCard" id="nearBtn" type="button"><div class="quickIcon">📍</div><div class="quickTitle" id="qaNearTitle"></div><div class="quickText" id="qaNearText"></div></button>
        <button class="quickCard" id="qaSunday" type="button"><div class="quickIcon">☀️</div><div class="quickTitle" id="qaSundayTitle"></div><div class="quickText" id="qaSundayText"></div></button>
        <button class="quickCard" id="myBtn" type="button"><div class="quickIcon">⭐</div><div class="quickTitle" id="qaMyTitle"></div><div class="quickText" id="qaMyText"></div></button>
      </div>
      <div class="utilityActions" aria-label="More actions">
        <button id="helpBtn" type="button"></button>
        <button id="aboutBtn" type="button"></button>
        <button id="whatsNewBtn" type="button"></button>
        <button id="updateBtn" type="button"></button>
      </div>
    </section>
    <p id="trustStrip" class="trust-strip"></p>
    <p id="resultCount" class="result-count" aria-live="polite" hidden></p>
    <section id="results" class="results" aria-live="polite"></section>
  </main>
  <footer><span id="version"></span></footer>
  <nav class="bottomNav" aria-label="Main navigation">
    <div class="bottomNavInner">
      <button class="navBtn active" id="navHome" type="button"><span aria-hidden="true">🏠</span><span id="navHomeLabel"></span></button>
      <button class="navBtn" id="navSearch" type="button"><span aria-hidden="true">🔍</span><span id="navSearchLabel"></span></button>
      <button class="navBtn" id="navNear" type="button"><span aria-hidden="true">📍</span><span id="navNearLabel"></span></button>
      <button class="navBtn" id="navFav" type="button"><span aria-hidden="true">⭐</span><span id="navFavLabel"></span></button>
      <button class="navBtn" id="navMore" type="button"><span aria-hidden="true">⚙️</span><span id="navMoreLabel"></span></button>
    </div>
  </nav>
  <div id="modal" hidden></div>
  <script src="fallback-data.js"></script>
  <script src="app.js"></script>
</body>
</html>

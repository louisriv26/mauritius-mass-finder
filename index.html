<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mauritius Mass Finder</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#23395d">
</head>
<body>
  <header>
    <h1 id="title">Mauritius Mass Finder</h1>
    <p id="subtitle"></p>
    <button id="langBtn" class="lang" type="button">Français</button>
  </header>
  <div id="updateBanner" class="update-banner" hidden></div>
  <div id="notice" class="notice" role="status" aria-live="polite" hidden></div>
  <main>
    <section class="controls" aria-label="Search and filters">
      <input id="search" type="search" autocomplete="off">
      <select id="day" aria-label="Day filter"></select>
      <button id="sundayBtn" type="button"></button>
      <label class="check"><input id="include" type="checkbox"> <span id="includeLabel"></span></label>
    </section>
    <section class="quick" aria-label="Quick actions">
      <button id="nearBtn" type="button"></button>
      <button id="myBtn" type="button"></button>
      <button id="helpBtn" type="button"></button>
      <button id="aboutBtn" type="button"></button>
      <button id="whatsNewBtn" type="button"></button>
      <button id="updateBtn" type="button"></button>
    </section>
    <p id="trustStrip" class="trust-strip"></p>
    <p id="resultCount" class="result-count" aria-live="polite" hidden></p>
    <section id="results" class="results" aria-live="polite"></section>
  </main>
  <footer><span id="version"></span></footer>
  <div id="modal" hidden></div>
  <script src="fallback-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
